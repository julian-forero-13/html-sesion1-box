<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .padre{
            width: 500px;
            height: auto;
            background-color: blueviolet;
            display: block;
            margin: 0px auto 40px auto;
            padding-top: 20px;
            padding-bottom: 20px;
            box-shadow: 5px 5px 15px 5px #0a17c5;
        }

        .hijo{
            margin-top: 50px;
            margin-left: auto;
            margin-bottom: 50px;
            margin-right: auto;
            width: 200px;
            height: 200px;
            background-color: red;
            display: block;
            padding: 20px 30px 5px 10px;
            border-top: 10px double blue;
            border-right: 10px dashed green;
            border-bottom: solid 5px black;
            border-left: solid 20px yellow;

            border-radius: 50%;
        }

        .hijo2{
            margin-top: -100px;
        }

    </style>
</head>
<body>
    <div class="padre">
        <div class="hijo">
            Hijo 1
        </div>
        <div class="hijo hijo2">
            Hijo 2
        </div>
    </div>
</body>
</html>
