<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

    <body>
    <h1>Inline</h1>
<div class="inline bg-orange-600  text-white">
    Productos
</div>
<div class="inline bg-blue-800  text-black">
    Servicios
</div>
<div class="inline bg-red-200  text-white">
    Contacto
</div>
<div class="inline bg-green-700  text-black">
    Nosotros
</div>
<hr />
<h1> Block: </h1>
<div class="block bg-blue-600  text-white-700 w-[200px] h-[100px]">
Productos
</div>
<div class="block bg-blue-400  text-red-800 w-[200px] h-[100px]">
    Servicios
</div>
<div class="block bg-blue-200  text-yellow-700 w-[200px] h-[100px]">
    Contacto
</div>
<div class="block bg-blue-500   text-white w-[200px] h-[100px]">
    Nosotros
</div>
    
</body>
</html>
