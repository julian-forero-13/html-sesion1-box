<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .elemento{
            display: inline;
            background-color: rgb(0, 0, 0);
            color: #ffffff;
            width: 200px;
            height: 200px;
        }

        .elemento_block{
            display: block;
            background-color: #023;
            color: yellow;

        }

        .resaltado{
            color: aqua;
            letter-spacing: 2pxyt;
            font-family: Arial;
            font-size: large;
            font-weight: bold;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Inline: </h1>
    <div class="inline bg-yellow-600 text-white">
        Productos
    </div>
    <div class="inline bg-blue-700 text-white">
        Nosotros
    </div>
    <div class="inline bg-red-500 text-white">
        Servicios
    </div>
    <div class="inline bg-purple-700 text-white">
        Contacto
    </div>
    <hr>
    <h1> Block: </h1>
    <div class="block bg-blue-700 w-[100px] h-[100px]">
        Productos
    </div>
    <div class="elemento_block">
        Nosotros
    </div>
    <div class="elemento_block">
        Servicios
    </div>
    <div class="elemento_block">
        Contacto
    </div>
    <hr>
</body>
</html>
